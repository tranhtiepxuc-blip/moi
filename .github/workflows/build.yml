name: Build Xposed APK
on:
  push:
    branches: [ "main", "master" ] # Chạy trên cả 2 nhánh đề phòng bạn lưu nhầm
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2.1
        cache-disabled: true # Tắt cache để không bị nhớ lệnh lỗi cũ

    # BƯỚC THẦN KỲ: Tự động quét và cưỡng ép sửa "ro.obi.xposed" thành "de.robv.android.xposed"
    - name: Force Fix Broken Dependencies
      run: |
        find . -type f -name "build.gradle" -exec sed -i 's/ro.obi.xposed/de.robv.android.xposed/g' {} +
        find . -type f -name "settings.gradle" -exec sed -i 's/ro.obi.xposed/de.robv.android.xposed/g' {} +

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2.1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean Project
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: FmsSupport_v1.0
        path: app/build/outputs/apk/debug/app-debug.apk
